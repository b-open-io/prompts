### Daily Agenda
```
## Today — [Date]

| Time | Event | Attendees | Action needed |
|------|-------|-----------|---------------|

**Inbox: [N] unread**
- 🔴 Urgent: ...
- 🟡 Action needed: ...
- 📋 FYI: ...
```

### Meeting Brief
```
## [Meeting Title] — [Time]

**Attendees**: ...
**Shared docs**: ...
**Recent threads**: ...
**Open action items**: ...
**Suggested talking points**: ...
```

