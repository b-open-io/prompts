<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>bOpen Business Card — Watercolor Dark (Front)</title>
<style>
  @font-face {
    font-family: 'Fraunces';
    src: url('__NODE_MODULES__/@fontsource-variable/fraunces/files/fraunces-latin-full-normal.woff2') format('woff2-variations');
    font-weight: 100 900; font-style: normal; font-display: block;
  }
  @font-face {
    font-family: 'Geist';
    src: url('__NODE_MODULES__/geist/dist/fonts/geist-sans/Geist-Variable.woff2') format('woff2-variations');
    font-weight: 100 900; font-style: normal; font-display: block;
  }

  @page { size: 3.75in 2.25in; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  html, body { width: 3.75in; height: 2.25in; }

  /* Palette: pulled from bopen.io's shadcn base-nova dark theme tokens
     (app/globals.css .dark). OKLCH source values flattened to hex for
     print fidelity.
       bg-deep    --background  oklch(0.1763 0.014 258.35)
       bg-card    --card        oklch(0.1993 0.0154 261.58)
       bg-soft    --secondary   oklch(0.2935 0.0237 253.66)
       fg         --foreground  oklch(0.9067 0 0)
       fg-muted   --muted-fg    oklch(0.6625 0.0181 250.92)
       cyan       --primary     oklch(0.76 0.13 207)  ← brand accent */
  :root {
    --bg-deep:  #13151e;
    --bg-card:  #191c26;
    --bg-soft:  #272d3a;
    --fg:       #e2e2e2;
    --fg-muted: #9aa3b8;
    --fg-warm:  #ede4cf;
    --cyan:     #5eb9d6;
    --cyan-dim: rgba(94, 185, 214, 0.55);
    --indigo:   #6d6bb3;
    --plum:     #9a6db3;
  }

  body {
    font-family: 'Geist', system-ui, sans-serif;
    color: var(--fg);
    background: var(--bg-deep);
  }

  .card {
    width: 3.75in; height: 2.25in;
    padding: 0.3125in;
    background: var(--bg-card);
    position: relative;
    overflow: hidden;
  }

  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 0.78in 1fr auto;
    column-gap: 0.18in;
    grid-template-rows: auto 1fr auto;
    height: 100%;
  }

  /* Pixel-photo "stamp" — on dark, use a warm-paper card rather than
     pure white. The portrait's green/pink palette pops against the
     warm tone, and the soft cyan glow ties to the brand accent. */
  .stamp {
    grid-row: 1 / 3;
    grid-column: 1;
    width: 0.78in;
    height: 0.78in;
    margin-top: 0.02in;
    padding: 3px;
    background: var(--fg-warm);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow:
      0 0 0 1px rgba(94, 185, 214, 0.10),
      0 6px 18px rgba(0, 0, 0, 0.45),
      0 2px 4px rgba(94, 185, 214, 0.10);
    transform: rotate(-1.2deg);
    position: relative;
  }
  .stamp img {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  .brand {
    grid-column: 2 / 4;
    grid-row: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.2in;
    padding-top: 0.03in;
  }
  .brand .logo {
    height: 0.28in;
    width: auto;
    color: var(--fg);
  }
  .brand .corner {
    font-family: 'Geist', sans-serif;
    font-size: 6.5pt;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cyan);
  }

  .center {
    grid-column: 2 / 4;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 0.05in;
  }
  .name {
    font-family: 'Fraunces', 'Geist', serif;
    font-weight: 500;
    font-size: 24pt;
    line-height: 1.02;
    letter-spacing: -0.01em;
    color: var(--fg-warm);
    font-variation-settings: "opsz" 144, "SOFT" 80, "WONK" 1;
  }
  .role {
    font-family: 'Geist', sans-serif;
    font-size: 7.5pt;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-top: 9px;
  }

  .divider {
    display: block;
    width: 1.55in;
    height: 7px;
    margin-top: 11px;
    overflow: visible;
  }

  .footer {
    grid-column: 1 / 4;
    grid-row: 3;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'Geist', sans-serif;
    font-size: 8pt;
    font-weight: 500;
    color: var(--fg);
    gap: 0.2in;
  }
  .footer-left { display: flex; flex-direction: column; gap: 2px; }
  .footer-left .email { color: var(--fg); }
  .footer-left .phone { color: var(--fg-muted); }
  .handle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--fg);
  }
  .handle svg { width: 10px; height: 10px; flex: 0 0 10px; }
</style>
</head>

        <span class="corner">bopen.io</span>
      </div>

</html>
