<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>bOpen Business Card</title>
<style>
  /* Two body fonts available — toggle via body.font-inter / body.font-geist. */
  @font-face {
    font-family: 'Inter';
    src: url('node_modules/@fontsource-variable/inter/files/inter-latin-wght-normal.woff2') format('woff2-variations');
    font-weight: 100 900; font-style: normal; font-display: block;
  }
  @font-face {
    font-family: 'Geist';
    src: url('node_modules/geist/dist/fonts/geist-sans/Geist-Variable.woff2') format('woff2-variations');
    font-weight: 100 900; font-style: normal; font-display: block;
  }

  @page { size: 3.75in 2.25in; margin: 0; }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  html, body { width: 3.75in; height: 2.25in; }

  body {
    font-family: var(--body-font, 'Geist'), system-ui, sans-serif;
    color: #0a0a0a;
    background: #ffffff;
  }
  body.font-inter { --body-font: 'Inter'; }
  body.font-geist { --body-font: 'Geist'; }

  .card {
    width: 3.75in; height: 2.25in;
    padding: 0.3125in;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: #ffffff;
    position: relative;
  }

  .header { display: flex; align-items: center; justify-content: space-between; }
  .logo { height: 0.32in; width: auto; }
  .muted { color: #666; }
  .corner-label {
    font-size: 7pt; letter-spacing: 0.08em; text-transform: uppercase; color: #999;
  }

  .center { display: flex; flex-direction: column; justify-content: center; }
  .name {
    font-size: 20pt; font-weight: 700; line-height: 1.0;
    letter-spacing: -0.015em; color: #0a0a0a;
  }
  .title {
    font-size: 9pt; font-weight: 500; color: #555;
    margin-top: 10px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* Accent line: solid bar -> dashes -> dots -> fade. SVG so geometry is precise. */
  .accent { display: block; margin-top: 12px; width: 1.6in; height: 4px; }

  .footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 0.25in;
    font-size: 8pt; font-weight: 500;
  }
  .footer-left { display: flex; flex-direction: column; gap: 3px; }
  .footer-left .email { color: #0a0a0a; }
  .footer-left .tagline { color: #666; font-size: 7.5pt; letter-spacing: 0.02em; }

  .handle-group { display: inline-flex; align-items: center; gap: 6px; color: #0a0a0a; }
  .handle-group .x-logo { width: 10px; height: 10px; flex: 0 0 10px; }
</style>
</head>
