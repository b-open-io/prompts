name: Skill Benchmarks

# On push: re-benchmarks only the skills that changed (using haiku — cheap).
# Locally: bun run benchmark --skill <name>  (uses your Claude session, free)
# Override model: BENCHMARK_MODEL=claude-sonnet-4-6 bun run benchmark

on:
  push:
    branches: [master]
    paths:
      - 'skills/*/evals/**'
      - 'skills/*/SKILL.md'
      - 'scripts/benchmark.tsx'
  schedule:
    # Weekly full re-run on Sundays to catch model drift
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Detect changed skills (push only)
        id: changed
        if: github.event_name == 'push'
        run: |
          SKILLS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^skills/' \
            | awk -F'/' '{print $2}' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)
          echo "skills=$SKILLS" >> "$GITHUB_OUTPUT"
          echo "Changed skills: $SKILLS"

      - name: Run benchmarks (changed skills, haiku model)
        if: github.event_name == 'push' && steps.changed.outputs.skills != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BENCHMARK_MODEL: haiku
        run: |
          for skill in ${{ steps.changed.outputs.skills }}; do
            if [ -f "skills/$skill/evals/evals.json" ]; then
              echo "Benchmarking: $skill"
              bun run scripts/benchmark.tsx --skill "$skill"
            else
              echo "Skipping $skill (no evals)"
            fi
          done

      - name: Run all benchmarks (schedule / manual, haiku model)
        if: github.event_name != 'push'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BENCHMARK_MODEL: haiku
        run: bun run scripts/benchmark.tsx

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/latest.json
          git diff --cached --quiet || git commit -m "Update benchmark results [skip ci]"
          git push
