name: Skill Benchmarks

# Benchmarks are run locally (using your Claude session) before pushing.
# This workflow just validates that results are present and not stale.
# Run locally: bun run benchmark --skill <name>

on:
  push:
    branches: [master]
    paths:
      - 'skills/**'
      - 'benchmarks/latest.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check benchmark results exist
        run: |
          if [ ! -f benchmarks/latest.json ]; then
            echo "ERROR: benchmarks/latest.json missing. Run: bun run benchmark"
            exit 1
          fi
          echo "Benchmark results present."
          cat benchmarks/latest.json | python3 -c "
import json, sys
r = json.load(sys.stdin)
print(f\"Skills: {r['total_skills']}, Evals: {r['total_evals']}, Generated: {r['generated_at']}\")
"

      - name: Warn if skills changed but results not updated
        run: |
          CHANGED_SKILLS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^skills/' \
            | awk -F'/' '{print $2}' \
            | sort -u)

          if [ -n "$CHANGED_SKILLS" ]; then
            RESULTS_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'benchmarks/latest.json' || true)
            if [ -z "$RESULTS_CHANGED" ]; then
              echo "WARNING: Skills changed but benchmarks/latest.json was not updated."
              echo "Changed skills: $CHANGED_SKILLS"
              echo "Run: bun run benchmark --skill <name>"
            fi
          fi
